name: CI

on:
  push:
    branches:
      - main
      - "phase-*"
  pull_request:

permissions:
  contents: read

jobs:
  test:
    name: Test
    runs-on: ubuntu-latest

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up uv
        uses: astral-sh/setup-uv@v5
        with:
          enable-cache: true

      - name: Install Python
        run: uv python install 3.13

      - name: Lint
        run: uv run --python 3.13 ruff check .

      - name: Check formatting
        run: uv run --python 3.13 ruff format --check .

      - name: Type check
        run: uv run --python 3.13 ty check

      - name: Test
        run: uv run --python 3.13 pytest tests
